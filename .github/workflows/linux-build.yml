name: Linux Build & Package
on:
  workflow_dispatch: # Allows manual trigger from the Actions tab
  push:
    branches: [ "main" ]

jobs:
  release:
    name: Build Linux Installers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libwebkit2gtk-4.1-dev \
            libsecret-1-dev \
            libmpv-dev \
            libasound2-dev \
            libdbus-1-dev \
            appstream \
            libfuse2 # Required for AppImage to run on modern Ubuntu runners

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter Distributor
        run: dart pub global activate flutter_distributor

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop

      - name: Build and Package
        run: |
          # Ensure the Dart binaries are in the path
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          
          # This builds both .deb and .AppImage based on your distributor.yaml
          flutter_distributor release --name production --jobs linux-deb,linux-appimage

      - name: Upload Installers
        uses: actions/upload-artifact@v4
        with:
          name: BeatBoss-Linux-Installers
          # flutter_distributor puts compiled files in the dist/ folder
          path: dist/production/*/
          retention-days: 7
